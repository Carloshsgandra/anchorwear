server.port=${PORT:8080}
spring.thymeleaf.cache=false
server.forward-headers-strategy=native

# H2 Database (arquivo persistente)
spring.datasource.url=jdbc:h2:file:./anchorwear_db;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (acessível em /h2-console em desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Session timeout: 7 dias
server.servlet.session.timeout=604800s

# Multipart (upload de imagens)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.javaduolingo=INFO
