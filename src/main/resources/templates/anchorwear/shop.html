<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{anchorwear/layout :: layout(~{::title}, ~{::section#main}, 'shop')}">
<head><title>Loja</title></head>
<body>
<section id="main">

<div class="aw-shop-header">
  <div class="aw-container" style="text-align:center;">
    <p class="aw-section-label" style="justify-content:center;">Coleção Completa</p>
    <h1 class="aw-section-title" style="font-size:clamp(56px,8vw,100px);">LOJA</h1>
    <p style="color:var(--aw-gray-400);font-size:15px;margin-top:16px;font-family:'Inter',sans-serif;">
      Peças com identidade. Streetwear com propósito.
    </p>
  </div>
</div>

<div class="aw-section" style="padding-top:40px;">
  <div class="aw-container">

    <!-- Filtros dinâmicos -->
    <div class="aw-shop-filters">
      <button th:each="cat : ${categories}"
              class="aw-filter-btn"
              th:classappend="${cat == 'Todos'} ? ' active'"
              th:text="${cat}"
              th:onclick="'filterProducts(' + '\'' + cat + '\'' + ', this)'">Todos</button>
      <div style="margin-left:auto;display:flex;gap:12px;align-items:center;">
        <span style="font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--aw-gray-400);">Ordenar:</span>
        <select onchange="sortProducts(this.value)" style="background:var(--aw-charcoal);border:1px solid var(--aw-gray-800);color:var(--aw-white);padding:8px 16px;border-radius:4px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;outline:none;">
          <option value="default">Destaques</option>
          <option value="price-asc">Menor Preço</option>
          <option value="price-desc">Maior Preço</option>
          <option value="name">Nome A-Z</option>
        </select>
      </div>
    </div>

    <div class="aw-shop-meta" style="margin-bottom:32px;">
      <span class="aw-shop-count" id="productCount">
        <span th:text="${#lists.size(products)}">0</span> produtos
      </span>
    </div>

    <!-- Products Grid -->
    <div class="aw-products-grid" id="productsGrid">
      <div th:each="product : ${products}"
           class="aw-product-card"
           th:data-category="${product.category}"
           th:data-price="${product.price}"
           th:data-name="${product.name}">
        <a th:href="@{/anchorwear/produto/{id}(id=${product.id})}">
          <div class="aw-product-card__img" th:style="'background:' + ${product.bgColor}">
            <!-- Imagem real se disponível -->
            <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                 th:src="${product.imageUrl}" th:alt="${product.name}"
                 style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"/>
            <!-- Placeholder visual se sem imagem -->
            <div th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}" class="aw-product-visual">
              <span class="aw-pv-anchor">⚓</span>
              <span class="aw-pv-label" th:text="${product.name}"></span>
            </div>
            <div class="aw-product-card__overlay">
              <span style="font-size:14px;font-family:'Space Grotesk',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:rgba(255,255,255,0.1);padding:12px 24px;border-radius:4px;border:1px solid rgba(255,255,255,0.2);">Ver Produto</span>
            </div>
            <span th:if="${product.badge == 'new'}" class="aw-product-card__badge badge-new">Novo</span>
            <span th:if="${product.badge == 'bestseller'}" class="aw-product-card__badge badge-bestseller">+ Vendido</span>
          </div>
        </a>
        <div class="aw-product-card__info">
          <p class="aw-product-card__category" th:text="${product.category}">Categoria</p>
          <p class="aw-product-card__name" th:text="${product.name}">Nome</p>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">
            <span th:each="sz : ${product.sizes}" class="aw-tag" th:text="${sz}">M</span>
          </div>
          <div class="aw-product-card__footer">
            <span class="aw-product-card__price" th:text="${product.priceFormatted}">R$ 0,00</span>
            <button class="aw-product-card__cart"
                    th:data-id="${product.id}"
                    th:data-name="${product.name}"
                    th:data-price="${product.price}"
                    th:data-image="${product.imageUrl}"
                    onclick="addToCartFromBtn(this)"
                    title="Adicionar ao carrinho">🛒</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" style="display:none;text-align:center;padding:80px 20px;">
      <p style="font-size:40px;margin-bottom:16px;">🔍</p>
      <p style="font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;color:var(--aw-gray-600);">NENHUM PRODUTO</p>
      <p style="color:var(--aw-gray-400);margin-top:8px;">Tente outra categoria.</p>
    </div>

  </div>
</div>

<script>
function filterProducts(category, btn) {
  document.querySelectorAll('.aw-filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('#productsGrid .aw-product-card');
  let visible = 0;
  cards.forEach(card => {
    const show = category === 'Todos' || card.dataset.category === category;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  document.getElementById('productCount').textContent = visible + ' produtos';
  document.getElementById('emptyState').style.display = visible === 0 ? 'block' : 'none';
}
function sortProducts(method) {
  const grid = document.getElementById('productsGrid');
  const cards = Array.from(grid.querySelectorAll('.aw-product-card'));
  cards.sort((a, b) => {
    if (method === 'price-asc') return parseFloat(a.dataset.price) - parseFloat(b.dataset.price);
    if (method === 'price-desc') return parseFloat(b.dataset.price) - parseFloat(a.dataset.price);
    if (method === 'name') return a.dataset.name.localeCompare(b.dataset.name);
    return 0;
  });
  cards.forEach(c => grid.appendChild(c));
}
</script>

</section>
</body>
</html>
