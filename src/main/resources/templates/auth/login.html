<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — Anchor Wear Oficial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" th:href="@{/css/anchorwear.css}"/>
  <link rel="stylesheet" th:href="@{/css/anchorwear-extra.css}"/>
</head>
<body class="aw-body aw-auth-page">

<div class="aw-auth-container">
  <a th:href="@{/anchorwear}" class="aw-auth-logo">ANCHOR<span>.</span>WEAR</a>
  <h1 class="aw-auth-title">Entrar na sua conta</h1>
  <p class="aw-auth-sub">Bem-vindo de volta</p>

  <div th:if="${param.error}" class="aw-alert aw-alert--error">
    E-mail ou senha incorretos. Tente novamente.
  </div>
  <div th:if="${successMsg}" class="aw-alert aw-alert--success" th:text="${successMsg}"></div>

  <form th:action="@{/auth/login}" method="post" class="aw-auth-form">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="aw-form__group">
      <label class="aw-form__label">E-mail</label>
      <input type="email" name="email" class="aw-form__input" placeholder="seu@email.com" required autofocus/>
    </div>

    <div class="aw-form__group">
      <label class="aw-form__label">Senha</label>
      <input type="password" name="password" class="aw-form__input" placeholder="••••••••" required/>
    </div>

    <div class="aw-auth-options">
      <label class="aw-auth-remember">
        <input type="checkbox" name="remember-me"/> Lembrar de mim
      </label>
    </div>

    <button type="submit" class="aw-btn aw-btn--primary" style="width:100%;padding:14px;">Entrar</button>
  </form>

  <p class="aw-auth-switch">
    Não tem conta? <a th:href="@{/auth/registrar}">Criar conta grátis</a>
  </p>
</div>

</body>
</html>
