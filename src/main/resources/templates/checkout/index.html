<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{anchorwear/layout :: layout('Checkout', ~{::main}, 'checkout')}">
<main th:fragment="content">
<div class="aw-section aw-section--light" style="min-height:80vh;padding:60px 0;">
  <div class="aw-container">
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;margin-bottom:32px;color:#0a0a0a;">
      Finalizar Pedido</h1>

    <div th:if="${errorMsg}" class="aw-alert aw-alert--error" th:text="${errorMsg}"></div>

    <form th:action="@{/checkout}" method="post" th:object="${form}" id="checkoutForm">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <!-- Cart JSON será preenchido pelo JavaScript -->
      <input type="hidden" th:field="*{cartJson}" id="cartJsonInput"/>

      <div class="aw-checkout-layout">
        <!-- Coluna Esquerda: Endereço + Pagamento -->
        <div class="aw-checkout-left">

          <!-- Endereço -->
          <div class="aw-checkout-section">
            <h2 class="aw-checkout-section__title">Endereço de Entrega</h2>

            <div class="aw-form__group">
              <label class="aw-form__label">Nome do destinatário</label>
              <input type="text" th:field="*{shippingName}" class="aw-form__input" required/>
              <span class="aw-form__error" th:if="${#fields.hasErrors('shippingName')}" th:errors="*{shippingName}"></span>
            </div>
            <div class="aw-form__row">
              <div class="aw-form__group" style="flex:0 0 160px;">
                <label class="aw-form__label">CEP</label>
                <input type="text" th:field="*{shippingZip}" class="aw-form__input" id="cepInput"
                       placeholder="00000-000" maxlength="9" required
                       oninput="formatCep(this)" onblur="buscarCep(this.value)"/>
                <span class="aw-form__error" th:if="${#fields.hasErrors('shippingZip')}" th:errors="*{shippingZip}"></span>
              </div>
              <div class="aw-form__group" style="flex:1;">
                <label class="aw-form__label">Rua</label>
                <input type="text" th:field="*{shippingStreet}" class="aw-form__input" id="streetInput" required/>
              </div>
            </div>
            <div class="aw-form__row">
              <div class="aw-form__group" style="flex:0 0 120px;">
                <label class="aw-form__label">Número</label>
                <input type="text" th:field="*{shippingNumber}" class="aw-form__input" required/>
              </div>
              <div class="aw-form__group" style="flex:1;">
                <label class="aw-form__label">Complemento</label>
                <input type="text" th:field="*{shippingComplement}" class="aw-form__input" placeholder="Apto, Bloco..."/>
              </div>
            </div>
            <div class="aw-form__row">
              <div class="aw-form__group" style="flex:1;">
                <label class="aw-form__label">Bairro</label>
                <input type="text" th:field="*{shippingNeighborhood}" class="aw-form__input" id="neighborhoodInput" required/>
              </div>
              <div class="aw-form__group" style="flex:1;">
                <label class="aw-form__label">Cidade</label>
                <input type="text" th:field="*{shippingCity}" class="aw-form__input" id="cityInput" required/>
              </div>
              <div class="aw-form__group" style="flex:0 0 80px;">
                <label class="aw-form__label">UF</label>
                <input type="text" th:field="*{shippingState}" class="aw-form__input" id="stateInput" maxlength="2" required/>
              </div>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#555;cursor:pointer;margin-top:8px;">
              <input type="checkbox" th:field="*{saveAddress}"/> Salvar endereço para próximas compras
            </label>
          </div>

          <!-- Frete -->
          <div class="aw-checkout-section">
            <h2 class="aw-checkout-section__title">Tipo de Frete</h2>
            <div class="aw-shipping-options">
              <label class="aw-shipping-option" id="optPAC">
                <input type="radio" th:field="*{shippingType}" value="PAC" checked onchange="updateShipping()"/>
                <div>
                  <strong>PAC</strong>
                  <small>5 a 10 dias úteis · R$ 14,90</small>
                </div>
              </label>
              <label class="aw-shipping-option" id="optSEDEX">
                <input type="radio" th:field="*{shippingType}" value="SEDEX" onchange="updateShipping()"/>
                <div>
                  <strong>SEDEX</strong>
                  <small>1 a 3 dias úteis · R$ 29,90</small>
                </div>
              </label>
            </div>
            <small id="freeShippingNote" style="color:#4CAF50;display:none;">🎉 Frete grátis acima de R$ 299!</small>
          </div>

          <!-- Pagamento -->
          <div class="aw-checkout-section">
            <h2 class="aw-checkout-section__title">Forma de Pagamento</h2>
            <div class="aw-payment-options">
              <label class="aw-payment-option" id="payPIX">
                <input type="radio" th:field="*{paymentMethod}" value="PIX" checked/>
                <span class="aw-payment-icon">📱</span>
                <div><strong>PIX</strong><small>Aprovação imediata · 5% desconto</small></div>
              </label>
              <label class="aw-payment-option" id="payCARD">
                <input type="radio" th:field="*{paymentMethod}" value="CREDIT_CARD"/>
                <span class="aw-payment-icon">💳</span>
                <div><strong>Cartão de Crédito</strong><small>Parcelamento em até 12x</small></div>
              </label>
              <label class="aw-payment-option" id="payBOLETO">
                <input type="radio" th:field="*{paymentMethod}" value="BOLETO"/>
                <span class="aw-payment-icon">📄</span>
                <div><strong>Boleto Bancário</strong><small>Vencimento em 3 dias úteis</small></div>
              </label>
            </div>
            <span class="aw-form__error" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></span>
          </div>
        </div>

        <!-- Coluna Direita: Resumo -->
        <div class="aw-checkout-right">
          <div class="aw-checkout-summary">
            <h2 class="aw-checkout-section__title">Resumo do Pedido</h2>
            <div id="cartSummary" style="margin-bottom:16px;"></div>

            <!-- Cupom -->
            <div class="aw-form__group">
              <label class="aw-form__label">Cupom de desconto</label>
              <div style="display:flex;gap:8px;">
                <input type="text" th:field="*{couponCode}" class="aw-form__input" id="couponInput"
                       placeholder="ANCHOR10" style="text-transform:uppercase;flex:1;"/>
                <button type="button" class="aw-btn aw-btn--outline" onclick="applyCoupon()" style="white-space:nowrap;">
                  Aplicar
                </button>
              </div>
              <div id="couponMsg" style="font-size:13px;margin-top:6px;"></div>
            </div>

            <div class="aw-order-summary-row"><span>Subtotal</span><span id="summarySubtotal">R$ 0,00</span></div>
            <div class="aw-order-summary-row" id="discountRow" style="display:none;">
              <span>Desconto</span><span id="summaryDiscount" style="color:#4CAF50;">- R$ 0,00</span>
            </div>
            <div class="aw-order-summary-row"><span>Frete</span><span id="summaryShipping">R$ 14,90</span></div>
            <div class="aw-order-summary-row aw-order-summary-row--total">
              <span>Total</span><span id="summaryTotal">R$ 0,00</span>
            </div>

            <button type="submit" class="aw-btn aw-btn--primary" style="width:100%;padding:16px;margin-top:16px;font-size:16px;">
              Confirmar Pedido
            </button>
            <p style="text-align:center;font-size:12px;color:#8a8a8a;margin-top:12px;">
              🔒 Pagamento 100% seguro
            </p>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  let cartData = [];
  let discountValue = 0;

  function getCart() {
    try { return JSON.parse(localStorage.getItem('aw_cart') || '[]'); } catch { return []; }
  }

  function formatBRL(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',');
  }

  function renderSummary() {
    cartData = getCart();
    document.getElementById('cartJsonInput').value = JSON.stringify(cartData);

    const container = document.getElementById('cartSummary');
    if (!cartData.length) {
      container.innerHTML = '<p style="color:#8a8a8a;font-size:14px;">Carrinho vazio. <a href="/anchorwear/shop">Ver produtos</a></p>';
      return;
    }

    container.innerHTML = cartData.map(i =>
      `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;font-size:14px;">
        <div>
          <strong>${i.name}</strong>
          <div style="color:#888;font-size:12px;">${i.size || ''} · ${i.color || ''} · Qtd: ${i.qty}</div>
        </div>
        <span>R$ ${((i.price || 0) * (i.qty || 1)).toFixed(2).replace('.', ',')}</span>
      </div>`
    ).join('');

    updateTotals();
  }

  function subtotal() {
    return cartData.reduce((s, i) => s + (parseFloat(i.price) || 0) * (i.qty || 1), 0);
  }

  function shippingCost() {
    const sub = subtotal();
    if (sub >= 299) return 0;
    const type = document.querySelector('input[name="shippingType"]:checked');
    return type && type.value === 'SEDEX' ? 29.90 : 14.90;
  }

  function updateTotals() {
    const sub = subtotal();
    const ship = shippingCost();
    const total = Math.max(0, sub - discountValue + ship);

    document.getElementById('summarySubtotal').textContent = formatBRL(sub);
    document.getElementById('summaryShipping').textContent = ship === 0 ? 'Grátis' : formatBRL(ship);
    document.getElementById('summaryTotal').textContent = formatBRL(total);
    document.getElementById('freeShippingNote').style.display = sub >= 299 ? 'block' : 'none';
  }

  function updateShipping() { updateTotals(); }

  async function applyCoupon() {
    const code = document.getElementById('couponInput').value.trim();
    if (!code) return;
    const sub = subtotal();
    try {
      const res = await fetch('/api/coupon/validate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ code, subtotal: sub.toString() })
      });
      const data = await res.json();
      const msg = document.getElementById('couponMsg');
      if (data.valid) {
        discountValue = parseFloat(data.discount) || 0;
        msg.innerHTML = `<span style="color:#4CAF50;">✓ ${data.description} aplicado!</span>`;
        document.getElementById('discountRow').style.display = 'flex';
        document.getElementById('summaryDiscount').textContent = '- ' + formatBRL(discountValue);
        updateTotals();
      } else {
        discountValue = 0;
        document.getElementById('discountRow').style.display = 'none';
        msg.innerHTML = `<span style="color:#e53935;">${data.message}</span>`;
        updateTotals();
      }
    } catch (e) {
      console.error(e);
    }
  }

  function formatCep(el) {
    let v = el.value.replace(/\D/g, '');
    if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5,8);
    el.value = v;
  }

  async function buscarCep(cep) {
    cep = cep.replace(/\D/g, '');
    if (cep.length !== 8) return;
    try {
      const r = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
      const d = await r.json();
      if (!d.erro) {
        document.getElementById('streetInput').value = d.logradouro || '';
        document.getElementById('neighborhoodInput').value = d.bairro || '';
        document.getElementById('cityInput').value = d.localidade || '';
        document.getElementById('stateInput').value = d.uf || '';
      }
    } catch(e) {}
  }

  document.getElementById('checkoutForm').addEventListener('submit', function(e) {
    const cart = getCart();
    if (!cart.length) {
      e.preventDefault();
      alert('Seu carrinho está vazio!');
      return;
    }
    document.getElementById('cartJsonInput').value = JSON.stringify(cart);
  });

  renderSummary();
</script>
</main>
</html>
