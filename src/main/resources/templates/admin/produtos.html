<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout('Produtos', ~{::section}, 'produtos')}">
<section th:fragment="content">

  <div th:if="${successMsg}" class="aw-alert aw-alert--success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}" class="aw-alert aw-alert--error" th:text="${errorMsg}"></div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <p style="color:#888;" th:text="${products.size()} + ' produtos no total'">0 produtos</p>
    <a th:href="@{/admin/produtos/novo}" class="aw-btn aw-btn--primary">+ Novo Produto</a>
  </div>

  <div class="aw-admin-card">
    <div class="aw-table-wrap">
      <table class="aw-table">
        <thead>
          <tr><th>ID</th><th>Produto</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Badge</th><th>Status</th><th>Ações</th></tr>
        </thead>
        <tbody>
          <tr th:each="p : ${products}" th:classappend="${!p.active} ? 'aw-row--inactive'">
            <td th:text="${p.id}">1</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px;">
                <div style="width:36px;height:36px;border-radius:6px;flex-shrink:0;"
                     th:style="'background:' + ${p.bgColor} + ';'"></div>
                <span th:text="${p.name}">Nome</span>
              </div>
            </td>
            <td th:text="${p.category}">Categoria</td>
            <td th:text="${p.priceFormatted}">R$ 0,00</td>
            <td th:text="${p.stock}">0</td>
            <td>
              <span th:if="${p.badge != null and !p.badge.isEmpty()}"
                    class="aw-badge"
                    th:classappend="${p.badge == 'new'} ? 'aw-badge--info' : 'aw-badge--success'"
                    th:text="${p.badge}">badge</span>
              <span th:if="${p.badge == null or p.badge.isEmpty()}" style="color:#888;">—</span>
            </td>
            <td>
              <span class="aw-badge" th:if="${p.active}" style="background:#e8f5e9;color:#2e7d32;">Ativo</span>
              <span class="aw-badge" th:if="${!p.active}" style="background:#fce4ec;color:#c62828;">Inativo</span>
            </td>
            <td style="white-space:nowrap;">
              <a th:href="@{/admin/produtos/{id}/editar(id=${p.id})}" class="aw-link" style="margin-right:8px;">Editar</a>
              <form th:action="@{/admin/produtos/{id}/excluir(id=${p.id})}" method="post" style="display:inline;"
                    onsubmit="return confirm('Desativar este produto?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="aw-btn-link aw-btn-link--danger" th:if="${p.active}">Desativar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</section>
</html>
