<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout('Detalhes do Pedido', ~{::section}, 'pedidos')}">
<section th:fragment="content">

  <div th:if="${successMsg}" class="aw-alert aw-alert--success" th:text="${successMsg}"></div>
  <div th:if="${errorMsg}" class="aw-alert aw-alert--error" th:text="${errorMsg}"></div>

  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <a th:href="@{/admin/pedidos}" class="aw-link">← Voltar</a>
    <h2 style="margin:0;font-family:'Space Grotesk',sans-serif;" th:text="'Pedido #' + ${order.id}">Pedido</h2>
    <span class="aw-badge" th:classappend="'aw-badge--' + order.status.cssClass"
          th:text="${order.status.label}">Status</span>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px;" class="aw-admin-grid-2">

    <!-- Cliente -->
    <div class="aw-admin-card">
      <h3 class="aw-admin-card__subtitle">Cliente</h3>
      <p><strong th:text="${order.user.name}">Nome</strong></p>
      <p th:text="${order.user.email}" style="color:#888;font-size:14px;">email</p>
      <p th:if="${order.user.phone}" th:text="${order.user.phone}" style="color:#888;font-size:14px;"></p>
    </div>

    <!-- Entrega -->
    <div class="aw-admin-card">
      <h3 class="aw-admin-card__subtitle">Endereço de Entrega</h3>
      <p><strong th:text="${order.shippingName}">Nome</strong></p>
      <p th:text="${order.shippingAddress}" style="color:#888;font-size:14px;"></p>
    </div>
  </div>

  <!-- Itens -->
  <div class="aw-admin-card" style="margin-bottom:24px;">
    <h3 class="aw-admin-card__subtitle">Itens</h3>
    <div class="aw-table-wrap">
      <table class="aw-table">
        <thead><tr><th>Produto</th><th>Tam.</th><th>Cor</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr></thead>
        <tbody>
          <tr th:each="item : ${order.items}">
            <td th:text="${item.productName}">Produto</td>
            <td th:text="${item.size}">M</td>
            <td th:text="${item.color}">Preto</td>
            <td th:text="${item.quantity}">1</td>
            <td th:text="${item.unitPriceFormatted}">R$ 0,00</td>
            <td th:text="${item.totalFormatted}">R$ 0,00</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style="text-align:right;padding:12px 16px;border-top:1px solid #f0f0f0;">
      <div class="aw-order-summary-row"><span>Subtotal</span><span th:text="${order.subtotalFormatted}">R$ 0</span></div>
      <div class="aw-order-summary-row" th:if="${order.hasDiscount}">
        <span>Desconto</span><span style="color:#4CAF50;" th:text="'- ' + order.discountFormatted">- R$ 0</span>
      </div>
      <div class="aw-order-summary-row"><span>Frete</span><span th:text="${order.shippingFormatted}">R$ 0</span></div>
      <div class="aw-order-summary-row aw-order-summary-row--total"><span>Total</span><span th:text="${order.totalFormatted}">R$ 0</span></div>
    </div>
  </div>

  <!-- Ações -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;" class="aw-admin-grid-2">

    <!-- Atualizar Status -->
    <div class="aw-admin-card">
      <h3 class="aw-admin-card__subtitle">Atualizar Status</h3>
      <form th:action="@{/admin/pedido/{id}/status(id=${order.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="aw-form__group">
          <select name="status" class="aw-form__input">
            <option th:each="s : ${statusValues}"
                    th:value="${s.name()}"
                    th:text="${s.label}"
                    th:selected="${s == order.status}">Status</option>
          </select>
        </div>
        <button type="submit" class="aw-btn aw-btn--primary">Atualizar Status</button>
      </form>
    </div>

    <!-- Código de Rastreio -->
    <div class="aw-admin-card">
      <h3 class="aw-admin-card__subtitle">Código de Rastreio</h3>
      <form th:action="@{/admin/pedido/{id}/rastreio(id=${order.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="aw-form__group">
          <input type="text" name="trackingCode" class="aw-form__input"
                 th:value="${order.trackingCode}" placeholder="BR0000000000BR"/>
        </div>
        <button type="submit" class="aw-btn aw-btn--outline">Salvar Rastreio</button>
      </form>
    </div>
  </div>

</section>
</html>
